services:
  nginx:
    image: nginx:1.29.7-alpine
    container_name: nginx-server-debug
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - type: bind
        source: ./html
        target: /usr/share/nginx/html
      - type: bind
        source: ./nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped
    networks:
      - nginx-network
    depends_on:
      app1:
        condition: service_healthy
        restart: true
      app2:
        condition: service_healthy
        restart: true

  app1:
    build:
      context: ./tobalance
      dockerfile: dockerfiles/Dockerfile.debug
    container_name: app1-debug
    restart: unless-stopped
    networks:
      - nginx-network
    ports:
      # Expose debugpy port for remote debugging
      - "5678:5678"
    volumes:
      # Bind mount source code for hot reloading
      - type: bind
        source: ./tobalance/main.py
        target: /app/main.py
      - type: bind
        source: ./tobalance/requirements.txt
        target: /app/requirements.txt
    secrets:
      - source: app1-secret
        target: /api_key.txt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 5s
      retries: 5
      start_period: 20s
      timeout: 5s
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

  app2:
    build:
      context: ./tobalance
      dockerfile: dockerfiles/Dockerfile.debug
    container_name: app2-debug
    restart: unless-stopped
    networks:
      - nginx-network
    ports:
      # Expose debugpy port for remote debugging (different port)
      - "5679:5678"
    volumes:
      # Bind mount source code for hot reloading
      - type: bind
        source: ./tobalance/main.py
        target: /app/main.py
      - type: bind
        source: ./tobalance/requirements.txt
        target: /app/requirements.txt
    secrets:
      - source: app2-secret
        target: /api_key.txt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 5s
      retries: 5
      start_period: 20s
      timeout: 5s
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

networks:
  nginx-network:
    driver: bridge

secrets:
  app1-secret: 
    file: ./tobalance/apikeys/api_key1.txt
  app2-secret:
    file: ./tobalance/apikeys/api_key2.txt
